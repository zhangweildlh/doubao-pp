name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm run build:chrome
      - name: Upload build artifact (远端编译产物)
        uses: actions/upload-artifact@v4
        with:
          name: doubao-pp-chrome-mv3
          path: dist/chrome-mv3
          if-no-files-found: warn
