name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates (typecheck + test + build)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run compile

      - name: Unit & integration tests
        run: npm run test

      - name: Build Chrome MV3
        run: npm run build:chrome

      - name: Upload build artifact (远端编译产物)
        uses: actions/upload-artifact@v4
        with:
          name: doubao-pp-chrome-mv3
          path: dist/chrome-mv3
          if-no-files-found: warn
